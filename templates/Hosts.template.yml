# core_provisioner_version: 0.2.8
# provisioner_name: startcloud_generic_provisioner
# provisioner_version: 0.0.1
---
hosts:
  -
    settings:
      # Identifiers
      hostname: ::SERVER_HOSTNAME::
      domain: ::SERVER_DOMAIN::
      server_id: '::SERVER_ID::'

      # Resources
      vcpus: ::RESOURCES_CPU::
      memory: ::RESOURCES_RAM::

      # Console Access
      consoleport: ::SERVER_ID::
      consolehost: 0.0.0.0
      show_console: false ## Some people have reported issues when VBox doesn't show the Console

      # Box information
      box: '::BOX::'
      box_url: 'https://boxvault.startcloud.com'
      box_version: ::BOX_VERSION::
      box_arch: ::BOX_ARCH::

      # Provider Specific Settings
      provider_type: ::VAGRANT_PROVIDER::
      os_type: '::OS_TYPE::'
      firmware_type: UEFI

      # Setup Variables
      setup_wait: ::SETUP_WAIT::

      # Vagrant Configurations
      vagrant_user_private_key_path: ./core/ssh_keys/id_rsa
      vagrant_user: ::SERVER_DEFAULT_USER:: #  startcloud
      vagrant_user_pass: ::SERVER_DEFAULT_USER_PASS:: # 'STARTcloud24@!'
      vagrant_ssh_insert_key: true
      vagrant_ssh_forward_agent: true
      vagrant_communicator: ssh

    networks:
      # Future iteration may omit this to skip attaching a bridged adapter, the below block will need to be a template unto itself
      - type: external
        address: ::NETWORK_ADDRESS::
        netmask: ::NETWORK_NETMASK::
        gateway: ::NETWORK_GATEWAY::
        dhcp4: ::NETWORK_DHCP4::
        dhcp6: false # false
        bridge: ::NETWORK_BRIDGE::
        mac: auto
        dns:
          - nameserver: ::NETWORK_DNS_NAMESERVER_1::
          - nameserver: ::NETWORK_DNS_NAMESERVER_2::

    provisioning:
      shell:
        enabled: false
        scripts:
          - './scripts/aliases.sh'

      ansible:
        enabled: true
        scripts:
          - local:
              - script: ansible/generate-playbook.yml
                ansible_python_interpreter: /usr/bin/python3
                compatibility_mode: 2.0
                install_mode: pip
                ssh_pipelining: true
                verbose: false
                remote_collections: true
              - script: ansible/playbook.yml
                ansible_python_interpreter: /usr/bin/python3
                compatibility_mode: 2.0
                install_mode: pip
                ssh_pipelining: true
                verbose: false
                remote_collections: true

    folders:
      -
        description: "Disables VBoxSF, do not enable"
        map: .
        to: /vagrant
        type: virtualbox
        disabled: true
        automount: true
      -
        description: "Directory for Ansible Scripts"
        map: ./provisioners/ansible/
        to: /vagrant/ansible/
        type: rsync
        args:
          - '--verbose'
          - '--archive'
          - '--delete'
          - '-z'
          - '--copy-links'
      -
        description: "Directory for Pre-Signed SSLs"
        map: ./ssls/
        to: /secure/
        type: rsync

    vars:
      debug_all: true
      selfsigned_enabled: ::CERT_SELFSIGNED::
      haproxy_ssl_redirect: true

      ## Controls the Python Web Server Welcome Page Helper, when enabled help page is a massive security vulnerabilty, off for production machines
      quick_start: false

      ## Service account that owns deployed files (avoid the java_user default on a non-Java box)
      service_user: ::SERVICE_USER::
      service_group: ::SERVICE_GROUP::

    roles:
      - name: startcloud.startcloud_roles.setup
      - name: startcloud.startcloud_roles.networking
        tags: always
      - name: startcloud.startcloud_roles.disks
      - name: startcloud.startcloud_roles.hostname
      - name: startcloud.startcloud_roles.dependencies
      - name: startcloud.startcloud_roles.service_user
      - name: startcloud.startcloud_roles.sdkman_install
      - name: startcloud.startcloud_roles.sdkman_java
      - name: startcloud.startcloud_roles.ssl
      ::ROLES:: ## Injection point for this box's roles (e.g. haproxy, keepalived)
      - name: startcloud.startcloud_roles.vagrant_readme
      - name: startcloud.startcloud_roles.lockdown
