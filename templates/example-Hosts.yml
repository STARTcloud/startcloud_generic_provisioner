# core_provisioner_version: 0.2.8
# provisioner_name: startcloud_generic_provisioner
# provisioner_version: 0.0.1
#
# Template Notes:
# Example Hosts.yml for the generic provisioner — a base STARTcloud box with no
# application stack baked in. Add whatever startcloud.startcloud_roles you need
# under `roles:` (e.g. haproxy, keepalived).
# Instructions (paths relative to templates/):
# 1. Copy this file to ../Hosts.yml
# 2. Replace every REPLACEME
# 3. Add the roles this box should run under `roles:`
---
hosts:
  -
    settings:
      # Vagrant Debug
      debug_build: true

      # Identifiers
      hostname: REPLACEME #generic-n1
      domain: REPLACEME #example.com
      server_id: REPLACEME #'1234'

      # Extra Actions
      post_provision: true ## This calls extra things after Ansible completes, like syncing the new SSH key from the lockdown role or the support bundle

      # Resources
      vcpus: 2
      memory: 8G

      # Console Access
      consoleport: 1234
      consolehost: 0.0.0.0
      show_console: false

      # Box information
      box: 'STARTcloud/debian13-server'
      box_url: 'https://boxvault.startcloud.com'
      box_version: 2026.6.17
      box_arch: amd64

      # Provider Specific Settings
      provider_type: zone
      os_type: 'generic'
      firmware_type: UEFI

      # Setup Variables
      setup_wait: 420

      # Vagrant Configurations
      vagrant_user: startcloud
      vagrant_user_pass: REPLACEME #'STARTcloud24@!'
      vagrant_user_private_key_path: ./core/ssh_keys/id_rsa
      vagrant_ssh_insert_key: true
      vagrant_ssh_forward_agent: true
      vagrant_ssh_keep_alive: true

    plugins:
      install:
        -
          name: vagrant-scp-sync
          version: latest
      remove:
        -
          name: vagrant-scp

    zones:
      on_demand_vnics: true
      post_provision_boot: true
      vmtype: production
      brand: bhyve
      console_onboot: false
      console: webvnc
      debug: false
      debug_boot: false
      hostbridge: q35
      acpi: on
      autostart: true
      setup_method: zlogin
      diskif: virtio
      netif: virtio-net-viona
      booted_string: 'Booted - STARTcloud'
      lcheck_string: ':~$'
      alcheck_string: 'login:'
      safe_restart: 'sudo shutdown -r'
      safe_shutdown: 'sudo init 0 || true'
      clean_shutdown_time: 200
      snapshot_script: '/opt/vagrant/bin/Snapshooter.sh'
      cpu_configuration: simple

    networks:
      -
        type: external
        address: REPLACEME #172.17.0.10
        netmask: REPLACEME #255.255.0.0
        gateway: REPLACEME #172.17.1.1
        autoconf: false
        vlan: REPLACEME #65
        dhcp4: false
        dhcp6: false
        is_control: false
        route: default
        provisional: false
        bridge: REPLACEME #aggr1
        mac: auto
        dns:
          - nameserver: 1.1.1.1
          - nameserver: 1.0.0.1

    disks:
      boot:
        array: REPLACEME #Array-0
        dataset: zones
        volume_name: boot
        mount: /
        size: 64G

      additional_disks:

    provisioning:
      shell:
        enabled: false
        scripts:
          - './scripts/aliases.sh'

      ansible:
        enabled: true
        playbooks:
          - local:
              -
                description: "This playbook imports Hosts.yml variables into a generated playbook: /vagrant/ansible/playbook.yml"
                playbook: ansible/generate-playbook.yml
                ansible_python_interpreter: /usr/bin/python3
                compatibility_mode: 2.0
                install_mode: pip
                ssh_pipelining: true
                verbose: false
                callbacks: profile_tasks
                run: always
                remote_collections: false
                collections: []
              -
                description: "This playbook configures the machine using the generated playbook: /vagrant/ansible/playbook.yml"
                playbook: ansible/playbook.yml
                ansible_python_interpreter: /usr/bin/python3
                compatibility_mode: 2.0
                install_mode: pip
                ssh_pipelining: true
                verbose: false
                callbacks: profile_tasks
                run: once
                remote_collections: false
                collections:
                  - startcloud.startcloud_roles
              -
                description: "This playbook configures the machine for roles tagged as always, using the generated playbook: /vagrant/ansible/playbook.yml"
                playbook: ansible/always-playbook.yml
                ansible_python_interpreter: /usr/bin/python3
                compatibility_mode: 2.0
                install_mode: pip
                ssh_pipelining: true
                verbose: false
                callbacks: profile_tasks
                run: not_first
                remote_collections: false
                collections:
                  - startcloud.startcloud_roles

    folders:
      -
        description: "Disables VBoxSF, do not enable"
        map: .
        to: /vagrant
        type: virtualbox
        disabled: true
        automount: true

      -
        description: "Directory for Ansible Scripts"
        map: ./provisioners/ansible/
        to: /vagrant/ansible/
        type: rsync
        args:
          - '--verbose'
          - '--archive'
          - '--delete'
          - '-z'
          - '--copy-links'

      -
        description: "Directory for Ansible Collections"
        map: ./provisioners/ansible_collections/
        to: /vagrant/ansible_collections/
        type: rsync
        args:
          - '--verbose'
          - '--archive'
          - '--delete'
          - '-z'
          - '--copy-links'

      -
        description: "Directory for Pre-Signed SSLs"
        map: ./ssls/
        to: /secure/
        type: rsync

    vars:
      ## Provisioner Debug
      debug_all: true

      ## Controls the Python Web Server Welcome Page Helper, when enabled help page is a massive security vulnerabilty, off for production machines
      quick_start: false

      ## SSL
      selfsigned_enabled: true
      haproxy_ssl_redirect: true
      letsencrypt_enabled: false
      letsencrypt_staging_enabled: false

      ## Use Proxy for downloads and updates
      use_proxy: false
      proxy_server: 255.255.255.255
      proxy_port: 3128

      ## Extra Packages
      extra_packages: ['htop']

      ## Service account that owns deployed files (avoid the java_user default on a non-Java box)
      service_user: serviceuser
      service_group: servicegroup

    roles:
      # Base foundation
      - name: startcloud.startcloud_roles.setup
      - name: startcloud.startcloud_roles.networking
        tags: always
      - name: startcloud.startcloud_roles.disks
      - name: startcloud.startcloud_roles.hostname
      - name: startcloud.startcloud_roles.dependencies
      - name: startcloud.startcloud_roles.service_user
      - name: startcloud.startcloud_roles.sdkman_install
      - name: startcloud.startcloud_roles.sdkman_java
      - name: startcloud.startcloud_roles.ssl

      # Add the roles this box needs here, e.g.:
      #- name: startcloud.startcloud_roles.haproxy
      #- name: startcloud.startcloud_roles.keepalived

      - name: startcloud.startcloud_roles.vagrant_readme
      - name: startcloud.startcloud_roles.lockdown
