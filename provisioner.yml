name: startcloud_generic_provisioner
version: 0.2.1
label: STARTcloud Generic Provisioner
description: Generic provisioner for STARTcloud servers
author: STARTcloud
metadata:
  configuration:
    groups:
      - name: ssl
        label: SSL
      - name: packages
        label: Packages
      - name: proxy
        label: Download Proxy
        advanced: true
      - name: debug
        label: Debugging
        advanced: true
    fields:
      - name: CERT_SELFSIGNED
        label: Use Self-Signed Certificate
        type: checkbox
        group: ssl
        default: true
      - name: LETSENCRYPT_ENABLED
        label: Use Let's Encrypt
        type: checkbox
        group: ssl
        default: false
      - name: LETSENCRYPT_STAGING_ENABLED
        label: Use Let's Encrypt Staging Environment
        type: checkbox
        group: ssl
        default: false
        show_if:
          LETSENCRYPT_ENABLED: true
      - name: EXTRA_PACKAGES
        label: Extra Packages
        type: multiselect
        group: packages
        default:
          - htop
        options:
          - htop
          - tmux
          - vim
          - curl
          - wget
          - ncdu
          - iotop
      - name: USE_PROXY
        label: Use HTTP Proxy for Downloads
        type: checkbox
        group: proxy
        default: false
      - name: PROXY_SERVER
        label: Proxy Server
        type: text
        group: proxy
        required: true
        show_if:
          USE_PROXY: true
      - name: PROXY_PORT
        label: Proxy Port
        type: number
        group: proxy
        default: 3128
        show_if:
          USE_PROXY: true
        validate:
          min: 1
          max: 65535
      - name: DEBUG_ALL
        label: Verbose Provisioner Debug
        type: checkbox
        group: debug
        default: true
  presentation: {}
  roles:
    - name: asterisk
      depends_on:
        - setup
        - hostname
        - dependencies
        - service_user
        - sdkman_install
        - sdkman_java
        - fail2ban
    - name: bigbluebutton
      depends_on:
        - certbot
        - docker
    - name: bottles
      depends_on:
        - flatpak
    - name: composer
      depends_on:
        - php
    - name: docker
    - name: drupal
      depends_on:
        - php
        - composer
        - mysql
    - name: frigate
      depends_on:
        - docker
    - name: graylog
      depends_on:
        - mongodb
    - name: greenbone
      depends_on:
        - docker
    - name: guacamole
      depends_on:
        - tomcat
        - mysql
    - name: haproxy
      depends_on:
        - ssl
    - name: kubernetes
      depends_on:
        - docker
    - name: mariadb
    - name: mattermost
      depends_on:
        - mysql
        - nginx
    - name: mrtg
      depends_on:
        - snmp
    - name: mumble_web
      depends_on:
        - docker
    - name: nextcloud
      depends_on:
        - mysql
        - nginx
        - php
    - name: package_repository_server
      depends_on:
        - debian_packager
    - name: php_versions
      depends_on:
        - php
    - name: phpmyadmin
      depends_on:
        - mysql
        - nginx
        - php
    - name: quick_start
      depends_on:
        - service_user
        - cockpit
        - ssl
    - name: quick_start_html5
      depends_on:
        - service_user
        - cockpit
        - ssl
    - name: remote_access
      depends_on:
        - firewall
    - name: ruby
      depends_on:
        - service_user
    - name: sdkman_gradle
      depends_on:
        - sdkman_install
    - name: sdkman_install
      depends_on:
        - service_user
    - name: sdkman_java
      depends_on:
        - sdkman_install
    - name: sdkman_maven
      depends_on:
        - sdkman_install
    - name: startcloud_theme
      depends_on:
        - serial
    - name: tomcat
      depends_on:
        - sdkman_install
        - sdkman_java
    - name: vagrant_readme
    - name: vaultwarden
      depends_on:
        - docker
    - name: xrdp
      depends_on:
        - desktop_gnome
    - name: zfs_unlock_service
      depends_on:
        - zfs
    - name: zrepl
      depends_on:
        - zfs
