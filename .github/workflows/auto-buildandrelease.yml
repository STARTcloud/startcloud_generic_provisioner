name: AUTO - Build, Release and Publish

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}
    steps:
      -
        name: "Running Release-Please"
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-seed-archive:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      -
        name: "Checking out code with submodules"
        uses: actions/checkout@v4
        with:
          submodules: recursive

      -
        name: "Staging registry-shaped tree and building seed archive"
        id: stage
        run: |
          NAME="$(awk -F'"' '/^name:/ {print $2; exit}' provisioner.yml)"
          VERSION="$(awk -F'"' '/^version:/ {print $2; exit}' provisioner.yml)"
          RELEASE_VERSION="${{ needs.release-please.outputs.version }}"
          if [ "$VERSION" != "$RELEASE_VERSION" ]; then
            echo "provisioner.yml version ($VERSION) does not match released version ($RELEASE_VERSION)" >&2
            exit 1
          fi
          STAGE="$RUNNER_TEMP/seed/$NAME/$VERSION"
          mkdir -p "$STAGE"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitmodules' \
            --exclude='.gitattributes' \
            --exclude='release-please-config.json' \
            --exclude='.release-please-manifest.json' \
            ./ "$STAGE/"
          tar -czf "$NAME-$VERSION.tar.gz" -C "$RUNNER_TEMP/seed" "$NAME"
          echo "artifact=$NAME-$VERSION.tar.gz" >> "$GITHUB_OUTPUT"

      -
        name: "Uploading seed archive to the release"
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" "${{ steps.stage.outputs.artifact }}"
