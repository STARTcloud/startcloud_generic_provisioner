name: 'CodeQL Advanced'

# Reusable CodeQL scan, chained from ci.yml (needs ansible-lint) and run weekly
# on a schedule. Mirrors the hyperweaver-docs / hyperweaver-server /
# hyperweaver-ui layout. Only the repo's first-party code is scanned: the
# GitHub Actions workflows and the ansible filter plugin (Python). Ruby
# (Hosts.rb) lives in the core_provisioner submodule and is scanned there.

on:
  schedule:
    - cron: '17 5 * * 4'
  workflow_call:

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: python
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{matrix.language}}'
