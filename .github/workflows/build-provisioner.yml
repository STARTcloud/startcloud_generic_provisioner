name: Build Provisioner Artifact

# Reusable: called by release-please.yml when a release is created (and available
# via manual dispatch to rebuild an existing release's asset). Publishes release
# assets shaped for the hyperweaver-agent provisioner registry:
# <name>/<version>/... where name/version come from the root provisioner.yml.
# Checks out the TAG on both paths so rebuilds stay byte-identical.
#
# The core driver is NOT a submodule: it is fetched from the core_provisioner
# release pinned in driver.version, sha256-verified, extracted as driver/, and
# staged into the artifact. driver/ssls is the CANONICAL SSL tree — the
# document's folders[] syncs it to /secure/; there is no repo-side ssls/.
# startcloud_roles remains a git submodule until the Galaxy cut, so the tree is
# staged from a submodules-recursive checkout (git archive would omit it).

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to build (must match provisioner.yml)'
        required: true
        type: string
      tag_name:
        description: 'GitHub release tag'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (must match provisioner.yml)'
        required: true
        type: string
      tag_name:
        description: 'GitHub release tag'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build & Upload
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag with submodules
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag_name }}
          submodules: recursive

      - name: Fetch pinned core driver
        run: |
          TAG="$(tr -d '[:space:]' < driver.version)"
          VERSION="${TAG#v}"
          ARCHIVE="core_provisioner-${VERSION}.tar.gz"
          BASE="https://github.com/STARTcloud/core_provisioner/releases/download/${TAG}"
          echo "Fetching core driver ${TAG}"
          curl -fsSL -o "$RUNNER_TEMP/$ARCHIVE" "$BASE/$ARCHIVE"
          curl -fsSL -o "$RUNNER_TEMP/$ARCHIVE.sha256" "$BASE/$ARCHIVE.sha256"
          EXPECTED="$(awk '{print $1}' "$RUNNER_TEMP/$ARCHIVE.sha256")"
          ACTUAL="$(sha256sum "$RUNNER_TEMP/$ARCHIVE" | awk '{print $1}')"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "Checksum mismatch for $ARCHIVE: expected $EXPECTED, got $ACTUAL" >&2
            exit 1
          fi
          tar -xzf "$RUNNER_TEMP/$ARCHIVE" -C .
          test -f driver/Hosts.rb || { echo "driver/Hosts.rb missing after extraction" >&2; exit 1; }

      - name: Stage registry-shaped tree and build seed archive
        id: stage
        run: |
          # Quote-agnostic: release-please's version stamp may rewrite the line
          # with or without quotes.
          NAME="$(sed -nE 's/^name:[[:space:]]*"?([A-Za-z0-9._-]+)"?.*/\1/p' provisioner.yml | head -n1)"
          VERSION="$(sed -nE 's/^version:[[:space:]]*"?([0-9]+\.[0-9]+\.[0-9]+[0-9A-Za-z.+-]*)"?.*/\1/p' provisioner.yml | head -n1)"
          echo "Parsed name=$NAME version=$VERSION"
          if [ "$VERSION" != "${{ inputs.version }}" ]; then
            echo "provisioner.yml version ($VERSION) does not match requested version (${{ inputs.version }})" >&2
            exit 1
          fi
          STAGE="$RUNNER_TEMP/seed/$NAME/$VERSION"
          mkdir -p "$STAGE"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitmodules' \
            --exclude='.gitattributes' \
            --exclude='release-please-config.json' \
            --exclude='.release-please-manifest.json' \
            ./ "$STAGE/"
          tar -czf "$NAME-$VERSION.tar.gz" -C "$RUNNER_TEMP/seed" "$NAME"
          cp "$NAME-$VERSION.tar.gz" "$NAME.tar.gz"
          sha256sum "$NAME-$VERSION.tar.gz" > "$NAME-$VERSION.tar.gz.sha256"
          sha256sum "$NAME.tar.gz" > "$NAME.tar.gz.sha256"
          echo "artifact=$NAME-$VERSION.tar.gz" >> "$GITHUB_OUTPUT"
          echo "latest_artifact=$NAME.tar.gz" >> "$GITHUB_OUTPUT"

      # Four assets per release: the versioned archive for provenance, a
      # version-less one so consumers can fetch a stable URL
      # (releases/latest/download/startcloud_generic_provisioner.tar.gz), and a
      # .sha256 sidecar per archive (provisioner-catalog contract — the catalog
      # and agents verify it after download).
      - name: Upload seed archives to the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ inputs.tag_name }}" \
            "${{ steps.stage.outputs.artifact }}" \
            "${{ steps.stage.outputs.artifact }}.sha256" \
            "${{ steps.stage.outputs.latest_artifact }}" \
            "${{ steps.stage.outputs.latest_artifact }}.sha256" --clobber
