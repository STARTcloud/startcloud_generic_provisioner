name: MANUAL - Build, Release and Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'A Version (e.g. 0.1.25)'
        required: true
        type: string
      draft:
        description: 'Release as draft'
        required: true
        type: boolean
        default: true
      prerelease:
        description: 'Mark as prerelease'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      -
        name: "Checking out code with submodules"
        uses: actions/checkout@v4
        with:
          submodules: recursive

      -
        name: "Staging registry-shaped tree and building seed archive"
        id: stage
        run: |
          NAME="$(awk -F'"' '/^name:/ {print $2; exit}' provisioner.yml)"
          VERSION="${{ inputs.version }}"
          STAGE="$RUNNER_TEMP/seed/$NAME/$VERSION"
          mkdir -p "$STAGE"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitmodules' \
            --exclude='.gitattributes' \
            --exclude='release-please-config.json' \
            --exclude='.release-please-manifest.json' \
            ./ "$STAGE/"
          sed -i "s/^version: .*/version: \"$VERSION\" # x-release-please-version/" "$STAGE/provisioner.yml"
          sed -i "s/VERSION = '.*'/VERSION = '$VERSION'/" "$STAGE/version.rb"
          tar -czf "$NAME-$VERSION.tar.gz" -C "$RUNNER_TEMP/seed" "$NAME"
          echo "app_name=$NAME" >> "$GITHUB_OUTPUT"
          echo "artifact=$NAME-$VERSION.tar.gz" >> "$GITHUB_OUTPUT"

      -
        name: "Creating release"
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.stage.outputs.app_name }}: v${{ inputs.version }}"
          tag_name: ${{ steps.stage.outputs.app_name }}-v${{ inputs.version }}
          target_commitish: ${{ github.sha }}
          body: |
            This is a manual release of ${{ steps.stage.outputs.app_name }}.
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            ${{ steps.stage.outputs.artifact }}
          fail_on_unmatched_files: true
