name: CI

# Reusable CI. Called by release-please.yml on push to main, and run directly on
# every PR. Runs ansible-lint (strict), then chains CodeQL — same layout as
# hyperweaver-docs / hyperweaver-server / hyperweaver-ui.

on:
  workflow_call:
  pull_request:
    branches: ['main']

permissions:
  contents: read
  security-events: write
  packages: read
  actions: read

jobs:
  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Run ansible-lint (strict)
        uses: ansible/ansible-lint@main
        # The package's ansible.cfg points collections/roles/vault at /vagrant
        # (guest paths — this dir rsynced into the VM); env vars outrank
        # ansible.cfg, so point them at the same files where they live on the
        # runner. The vault password must be non-empty, so use the package's
        # own placeholder file, exactly as the guest does.
        env:
          ANSIBLE_COLLECTIONS_PATH: /home/runner/.ansible/collections
          ANSIBLE_ROLES_PATH: /home/runner/.ansible/roles
          ANSIBLE_VAULT_PASSWORD_FILE: ${{ github.workspace }}/provisioners/ansible/git_vault_password
        with:
          args: '--strict'
          working_directory: provisioners/ansible
          requirements_file: requirements.yml

  codeql-analysis:
    name: CodeQL
    needs: [ansible-lint]
    uses: ./.github/workflows/codeql.yml
